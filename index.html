<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Conceptos — IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0C10;
    --surface:   #111318;
    --surface2:  #181C24;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);

    /* node palette */
    --c-blue:    #60A5FA;
    --c-green:   #34D399;
    --c-amber:   #FBBF24;
    --c-purple:  #A78BFA;
    --c-rose:    #FB7185;

    --text-primary:   #F0F4FF;
    --text-secondary: #8892A4;
    --text-muted:     #4A5568;

    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
  }

  /* ── LAYOUT ─────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: 52px 1fr 180px;
    grid-template-columns: 1fr;
    width: 100vw; height: 100vh;
  }

  /* ── TOPBAR ─────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
  }

  #logo {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  #logo span { color: var(--c-blue); }

  /* breadcrumb */
  #breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .bc-item {
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .bc-item:hover { color: var(--text-primary); }
  .bc-item.active { color: var(--text-primary); cursor: default; }
  .bc-sep { color: var(--text-muted); font-size: 10px; }

  #hint {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  /* ── MAIN PANEL ─────────────────────────────────────────── */
  #main {
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
    position: relative;
  }

  /* LEFT: current node info */
  #node-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 36px 32px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  #node-panel::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--node-glow, rgba(96,165,250,0.08)) 0%, transparent 70%);
    pointer-events: none;
  }

  #node-subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--node-color, var(--c-blue));
    margin-bottom: 12px;
    opacity: 0.85;
  }

  #node-name {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.15;
    color: var(--text-primary);
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  #node-divider {
    width: 32px; height: 2px;
    background: var(--node-color, var(--c-blue));
    border-radius: 1px;
    margin-bottom: 20px;
    opacity: 0.6;
  }

  #node-desc {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  #example-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  #node-example {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    padding: 14px 16px;
    background: var(--surface2);
    border-left: 2px solid var(--node-color, var(--c-blue));
    border-radius: 0 6px 6px 0;
    opacity: 0.85;
  }

  /* RIGHT: child count + visual indicator */
  #context-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  #context-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%,
      var(--node-glow-soft, rgba(96,165,250,0.04)) 0%, transparent 70%);
    pointer-events: none;
  }

  #center-display {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  #center-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    position: relative;
    transition: border-color 0.4s;
  }

  #center-ring::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }

  #center-ring-inner {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--node-color-alpha, rgba(96,165,250,0.12));
    border: 1.5px solid var(--node-color, var(--c-blue));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--node-color, var(--c-blue));
    transition: all 0.4s var(--ease-out);
  }

  #children-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  #children-count-text {
    font-size: 13px;
    color: var(--text-secondary);
  }
  #children-count-text strong {
    color: var(--node-color, var(--c-blue));
  }

  /* ── BOTTOM: children nodes ─────────────────────────────── */
  #children-area {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  #children-area::-webkit-scrollbar { height: 4px; }
  #children-area::-webkit-scrollbar-track { background: transparent; }
  #children-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  #children-label-fixed {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    padding-right: 14px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  #children-scroll {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 0;
    flex-shrink: 0;
  }

  .child-node {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 13px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.22s var(--ease-out);
    min-width: 160px;
    max-width: 220px;
    position: relative;
    overflow: hidden;
  }

  .child-node::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--node-color);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .child-node:hover {
    border-color: var(--node-color);
    background: color-mix(in srgb, var(--node-color) 6%, var(--surface2));
    transform: translateY(-2px);
  }

  .child-node:hover::before { opacity: 1; }

  .child-node:active { transform: translateY(0); }

  .child-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .child-subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .child-arrow {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--node-color);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .child-node:hover .child-arrow {
    opacity: 1;
    transform: translateY(-50%) translateX(2px);
  }

  .child-node.leaf-node {
    opacity: 0.7;
    cursor: default;
  }
  .child-node.leaf-node:hover {
    transform: none;
    border-color: var(--border);
    background: var(--surface2);
  }
  .child-node.leaf-node::after {
    content: '·';
    position: absolute;
    right: 12px; top: 12px;
    color: var(--text-muted);
    font-size: 16px;
  }

  /* empty state */
  #no-children {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    display: none;
  }

  /* ── TRANSITIONS ─────────────────────────────────────────── */
  .fade-enter { animation: fadeIn 0.35s var(--ease-out) both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BACK BUTTON ─────────────────────────────────────────── */
  #back-btn {
    display: none;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    transition: all 0.2s;
    text-transform: uppercase;
  }
  #back-btn:hover {
    border-color: var(--border2);
    color: var(--text-primary);
  }
  #back-btn svg { width: 12px; height: 12px; }

  /* grid dots bg */
  #context-panel {
    background-image: radial-gradient(var(--border) 1px, transparent 1px);
    background-size: 28px 28px;
  }
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div id="logo">MAPA DE CONCEPTOS <span>//</span> IA</div>
    <div id="breadcrumb"></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button id="back-btn">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2L4 6l4 4"/>
        </svg>
        volver
      </button>
      <div id="hint">click en un nodo para explorar</div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main">
    <!-- LEFT: node info -->
    <aside id="node-panel">
      <div id="node-subtitle"></div>
      <div id="node-name"></div>
      <div id="node-divider"></div>
      <div id="node-desc"></div>
      <div id="example-label">Ejemplo</div>
      <div id="node-example"></div>
    </aside>

    <!-- RIGHT: visual context -->
    <section id="context-panel">
      <div id="center-display" class="fade-enter">
        <div id="center-ring">
          <div id="center-ring-inner">—</div>
        </div>
        <div id="children-label">Subnodos disponibles</div>
        <div id="children-count-text">—</div>
      </div>
    </section>
  </main>

  <!-- BOTTOM: children -->
  <footer id="children-area">
    <div id="children-label-fixed">explorar →</div>
    <div id="children-scroll"></div>
    <div id="no-children">Este nodo no tiene subnodos — es un concepto terminal.</div>
  </footer>

</div>

<script>
// ── STATE ────────────────────────────────────────────────────
let DATA = null;
let history = [];   // stack of node ids
let current = null; // current node object

// ── HELPERS ──────────────────────────────────────────────────
function findNode(id, node) {
  if (!node) return null;
  if (node.id === id) return node;
  for (const child of (node.children || [])) {
    const found = findNode(id, child);
    if (found) return found;
  }
  return null;
}

function getAncestors(targetId, node, path = []) {
  if (node.id === targetId) return [...path, node];
  for (const child of (node.children || [])) {
    const result = getAncestors(targetId, child, [...path, node]);
    if (result) return result;
  }
  return null;
}

function colorAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── RENDER ───────────────────────────────────────────────────
function render(node) {
  current = node;
  const color = node.color || '#60A5FA';
  const children = node.children || [];
  const hasChildren = children.length > 0;

  // CSS vars
  document.documentElement.style.setProperty('--node-color', color);
  document.documentElement.style.setProperty('--node-color-alpha', colorAlpha(color, 0.12));
  document.documentElement.style.setProperty('--node-glow', colorAlpha(color, 0.1));
  document.documentElement.style.setProperty('--node-glow-soft', colorAlpha(color, 0.05));

  // Left panel
  document.getElementById('node-subtitle').textContent = node.subtitle || '';
  document.getElementById('node-name').textContent = node.label;
  document.getElementById('node-desc').textContent = node.description || '';
  document.getElementById('node-example').textContent = node.example || '';

  // Center ring
  document.getElementById('center-ring-inner').textContent = hasChildren ? children.length : '—';

  document.getElementById('children-label').textContent =
    hasChildren ? 'Subnodos disponibles' : 'Nodo terminal';
  document.getElementById('children-count-text').innerHTML =
    hasChildren
      ? `<strong>${children.length}</strong> ${children.length === 1 ? 'concepto' : 'conceptos'} para explorar`
      : `Sin subnodos — concepto terminal`;

  // Breadcrumb
  renderBreadcrumb();

  // Back button
  const backBtn = document.getElementById('back-btn');
  backBtn.style.display = history.length > 0 ? 'flex' : 'none';

  // Children area
  const scroll = document.getElementById('children-scroll');
  const noChildren = document.getElementById('no-children');
  scroll.innerHTML = '';

  if (!hasChildren) {
    noChildren.style.display = 'block';
    document.getElementById('children-label-fixed').style.opacity = '0.3';
  } else {
    noChildren.style.display = 'none';
    document.getElementById('children-label-fixed').style.opacity = '1';
    children.forEach((child, i) => {
      const el = document.createElement('div');
      const isLeaf = !child.children || child.children.length === 0;
      el.className = 'child-node' + (isLeaf ? ' leaf-node' : '');
      el.style.setProperty('--node-color', child.color || color);
      el.style.animationDelay = `${i * 0.04}s`;
      el.classList.add('fade-enter');
      el.innerHTML = `
        <div class="child-label">${child.label}</div>
        <div class="child-subtitle">${child.subtitle || ''}</div>
        ${!isLeaf ? '<div class="child-arrow">→</div>' : ''}
      `;
      if (!isLeaf) {
        el.addEventListener('click', () => navigateTo(child));
      } else {
        el.addEventListener('click', () => renderLeafDetail(child));
      }
      scroll.appendChild(el);
    });
  }

  // Animate main panel
  document.getElementById('node-panel').classList.remove('fade-enter');
  void document.getElementById('node-panel').offsetWidth;
  document.getElementById('node-panel').classList.add('fade-enter');

  document.getElementById('center-display').classList.remove('fade-enter');
  void document.getElementById('center-display').offsetWidth;
  document.getElementById('center-display').classList.add('fade-enter');
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';

  const ancestors = getAncestors(current.id, DATA) || [];

  ancestors.forEach((node, i) => {
    const span = document.createElement('span');
    span.className = 'bc-item' + (i === ancestors.length - 1 ? ' active' : '');
    span.textContent = node.label;
    if (i < ancestors.length - 1) {
      span.addEventListener('click', () => navigateToBreadcrumb(node, i));
    }
    bc.appendChild(span);

    if (i < ancestors.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = '/';
      bc.appendChild(sep);
    }
  });
}

function navigateTo(node) {
  history.push(current.id);
  render(node);
}

function navigateToBreadcrumb(node, depth) {
  // pop history to the right depth
  const ancestors = getAncestors(current.id, DATA) || [];
  const stepsBack = ancestors.length - 1 - depth;
  for (let i = 0; i < stepsBack; i++) history.pop();
  render(node);
}

function navigateBack() {
  if (history.length === 0) return;
  const prevId = history.pop();
  const prevNode = findNode(prevId, DATA);
  if (prevNode) render(prevNode);
}

// Leaf node: show detail in left panel without navigating
function renderLeafDetail(node) {
  const color = node.color || current.color || '#60A5FA';
  document.documentElement.style.setProperty('--node-color', color);
  document.getElementById('node-subtitle').textContent = node.subtitle || '';
  document.getElementById('node-name').textContent = node.label;
  document.getElementById('node-desc').textContent = node.description || '';
  document.getElementById('node-example').textContent = node.example || '';
  document.getElementById('center-ring-inner').textContent = '·';
  document.getElementById('children-label').textContent = 'Nodo terminal';
  document.getElementById('children-count-text').innerHTML = 'Selecciona otro nodo abajo para continuar';

  document.getElementById('node-panel').classList.remove('fade-enter');
  void document.getElementById('node-panel').offsetWidth;
  document.getElementById('node-panel').classList.add('fade-enter');

  // highlight selected
  document.querySelectorAll('.child-node').forEach(el => {
    el.style.borderColor = '';
    el.style.background = '';
  });
}

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', navigateBack);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if (document.activeElement.tagName !== 'INPUT') navigateBack();
  }
});

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    render(DATA);
  })
  .catch(() => {
    // fallback: minimal inline data if fetch fails
    document.getElementById('node-name').textContent = 'Error cargando data.json';
    document.getElementById('node-desc').textContent = 'Asegúrate de abrir el archivo desde un servidor local o GitHub Pages.';
  });
</script>
</body>
</html>
