<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Conceptos — IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0C10;
  --surface: #111318;
  --surface2: #181C24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --c-blue: #60A5FA;
  --c-green: #34D399;
  --c-amber: #FBBF24;
  --c-purple: #A78BFA;
  --c-rose: #FB7185;
  --text-primary: #F0F4FF;
  --text-secondary: #8892A4;
  --text-muted: #4A5568;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 52px 1fr 160px;
  grid-template-columns: 1fr;
  width: 100vw; height: 100vh;
}

/* ── TOPBAR ─────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: relative;
  z-index: 10;
}
#logo {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  text-transform: uppercase;
}
#logo span { color: var(--c-blue); }

#breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
}
.bc-item {
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.2s;
  white-space: nowrap;
}
.bc-item:hover { color: var(--text-primary); }
.bc-item.active { color: var(--text-primary); cursor: default; }
.bc-sep { color: var(--text-muted); font-size: 10px; }
#hint {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ── MAIN PANEL ─────────────────────────────────────────── */
#main {
  display: grid;
  grid-template-columns: 420px 1fr;  /* wider left panel */
  overflow: hidden;
  position: relative;
}

/* LEFT: current node info — more space, bigger text */
#node-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 40px;   /* more padding */
  border-right: 1px solid var(--border);
  background: var(--surface);
  position: relative;
  overflow: hidden;
}
#node-panel::before {
  content: '';
  position: absolute;
  top: -60px; left: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--node-glow, rgba(96,165,250,0.08)) 0%, transparent 70%);
  pointer-events: none;
}
#node-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;   /* slightly larger */
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--node-color, var(--c-blue));
  margin-bottom: 14px;
  opacity: 0.85;
}
#node-name {
  font-size: 32px;   /* bigger title */
  font-weight: 600;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 22px;
  letter-spacing: -0.02em;
}
#node-divider {
  width: 32px; height: 2px;
  background: var(--node-color, var(--c-blue));
  border-radius: 1px;
  margin-bottom: 22px;
  opacity: 0.6;
}
#node-desc {
  font-size: 15.5px;   /* bigger description text */
  line-height: 1.85;
  color: var(--text-secondary);
  margin-bottom: 26px;
  max-width: 100%;
}
#example-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
#node-example {
  font-size: 14px;   /* bigger example text */
  line-height: 1.75;
  color: var(--text-secondary);
  padding: 16px 18px;
  background: var(--surface2);
  border-left: 2px solid var(--node-color, var(--c-blue));
  border-radius: 0 6px 6px 0;
  opacity: 0.85;
}

/* ── RIGHT: floating child bubbles ──────────────────────── */
#context-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  position: relative;
  overflow: hidden;
  background-image: radial-gradient(var(--border) 1px, transparent 1px);
  background-size: 28px 28px;
}
#context-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%,
    var(--node-glow-soft, rgba(96,165,250,0.04)) 0%, transparent 70%);
  pointer-events: none;
}

/* Bubble orbit container */
#bubble-container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Center label area */
#center-label-area {
  position: absolute;
  text-align: center;
  z-index: 2;
  pointer-events: none;
}
#children-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
#children-count-text {
  font-size: 13px;
  color: var(--text-secondary);
}
#children-count-text strong {
  color: var(--node-color, var(--c-blue));
}

/* Individual floating bubbles */
.child-bubble {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid var(--bubble-color, var(--c-blue));
  background: color-mix(in srgb, var(--bubble-color, var(--c-blue)) 10%, #111318);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: all 0.28s var(--ease-out);
  padding: 10px;
  z-index: 3;
  transform: translate(-50%, -50%);
}
.child-bubble:hover {
  background: color-mix(in srgb, var(--bubble-color, var(--c-blue)) 22%, #111318);
  box-shadow: 0 0 18px color-mix(in srgb, var(--bubble-color, var(--c-blue)) 35%, transparent);
  transform: translate(-50%, -50%) scale(1.08);
  z-index: 10;
}
.child-bubble.leaf-bubble {
  opacity: 0.65;
  cursor: default;
  border-style: dashed;
}
.child-bubble.leaf-bubble:hover {
  transform: translate(-50%, -50%);
  box-shadow: none;
  background: color-mix(in srgb, var(--bubble-color, var(--c-blue)) 10%, #111318);
}
.bubble-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.25;
  max-width: 90%;
  word-break: break-word;
}
.bubble-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 3px;
  max-width: 90%;
  word-break: break-word;
  display: none; /* show on larger bubbles */
}
.child-bubble.large .bubble-sub { display: block; }

/* Terminal node placeholder */
#terminal-msg {
  text-align: center;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  display: none;
}

/* ── BOTTOM: siblings navigation ────────────────────────── */
#children-area {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
#children-area::-webkit-scrollbar { height: 4px; }
#children-area::-webkit-scrollbar-track { background: transparent; }
#children-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

#children-label-fixed {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  padding-right: 14px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
#children-scroll {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 0;
  flex-shrink: 0;
}

.child-node {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 13px 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.22s var(--ease-out);
  min-width: 160px;
  max-width: 220px;
  position: relative;
  overflow: hidden;
}
.child-node::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--node-color);
  opacity: 0;
  transition: opacity 0.2s;
}
.child-node:hover {
  border-color: var(--node-color);
  background: color-mix(in srgb, var(--node-color) 6%, var(--surface2));
  transform: translateY(-2px);
}
.child-node:hover::before { opacity: 1; }
.child-node:active { transform: translateY(0); }
/* current sibling highlight */
.child-node.current-sibling {
  border-color: var(--node-color);
  background: color-mix(in srgb, var(--node-color) 10%, var(--surface2));
}
.child-node.current-sibling::before { opacity: 1; }

.child-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.3;
}
.child-subtitle {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.3;
}
.child-arrow {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--node-color);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}
.child-node:hover .child-arrow {
  opacity: 1;
  transform: translateY(-50%) translateX(2px);
}
.child-node.leaf-node {
  opacity: 0.7;
  cursor: default;
}
.child-node.leaf-node:hover {
  transform: none;
  border-color: var(--border);
  background: var(--surface2);
}
.child-node.leaf-node::after {
  content: '·';
  position: absolute;
  right: 12px; top: 12px;
  color: var(--text-muted);
  font-size: 16px;
}

#no-children {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  display: none;
}

/* ── TRANSITIONS ─────────────────────────────────────────── */
.fade-enter { animation: fadeIn 0.35s var(--ease-out) both; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bubblePop {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.bubble-pop {
  animation: bubblePop 0.4s var(--ease-out) both;
}

/* ── BACK BUTTON ─────────────────────────────────────────── */
#back-btn {
  display: none;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  transition: all 0.2s;
  text-transform: uppercase;
}
#back-btn:hover {
  border-color: var(--border2);
  color: var(--text-primary);
}
#back-btn svg { width: 12px; height: 12px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div id="logo">MAPA DE CONCEPTOS <span>//</span> IA</div>
    <div id="breadcrumb"></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button id="back-btn">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2L4 6l4 4"/>
        </svg>
        volver
      </button>
      <div id="hint">click en un nodo para explorar</div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main">
    <!-- LEFT: node info -->
    <aside id="node-panel">
      <div id="node-subtitle"></div>
      <div id="node-name"></div>
      <div id="node-divider"></div>
      <div id="node-desc"></div>
      <div id="example-label">Ejemplo</div>
      <div id="node-example"></div>
    </aside>

    <!-- RIGHT: floating bubbles -->
    <section id="context-panel">
      <div id="bubble-container">
        <div id="center-label-area">
          <div id="children-label">Subnodos disponibles</div>
          <div id="children-count-text">—</div>
        </div>
        <div id="terminal-msg">Nodo terminal<br><span style="font-size:10px;opacity:0.5">Sin subnodos</span></div>
      </div>
    </section>
  </main>

  <!-- BOTTOM: siblings -->
  <footer id="children-area">
    <div id="children-label-fixed">en este nivel →</div>
    <div id="children-scroll"></div>
    <div id="no-children">Este nodo no tiene hermanos — es el único en su nivel.</div>
  </footer>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────
let DATA = null;
let history = [];   // stack of node ids
let current = null; // current node object

// ── HELPERS ──────────────────────────────────────────────────
function findNode(id, node) {
  if (!node) return null;
  if (node.id === id) return node;
  for (const child of (node.children || [])) {
    const found = findNode(id, child);
    if (found) return found;
  }
  return null;
}

function getAncestors(targetId, node, path = []) {
  if (node.id === targetId) return [...path, node];
  for (const child of (node.children || [])) {
    const result = getAncestors(targetId, child, [...path, node]);
    if (result) return result;
  }
  return null;
}

// Get siblings of current node (children of parent)
function getSiblings(targetId, root) {
  // If targetId is root, no siblings
  if (root.id === targetId) return null;
  for (const child of (root.children || [])) {
    if (child.id === targetId) return root.children;
    const found = getSiblings(targetId, child);
    if (found) return found;
  }
  return null;
}

function colorAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── BUBBLE LAYOUT ─────────────────────────────────────────────
function renderBubbles(children, parentColor) {
  const container = document.getElementById('bubble-container');
  // Remove old bubbles
  container.querySelectorAll('.child-bubble').forEach(b => b.remove());

  const centerLabel = document.getElementById('center-label-area');
  const terminalMsg = document.getElementById('terminal-msg');

  if (!children || children.length === 0) {
    centerLabel.style.display = 'none';
    terminalMsg.style.display = 'block';
    return;
  }

  centerLabel.style.display = 'block';
  terminalMsg.style.display = 'none';

  const n = children.length;
  document.getElementById('children-count-text').innerHTML =
    `<strong>${n}</strong> ${n === 1 ? 'concepto' : 'conceptos'} para explorar`;

  // Compute positions — arrange in a circle or ellipse
  const cw = container.offsetWidth  || 600;
  const ch = container.offsetHeight || 400;

  // Bubble sizes based on count
  let baseSize = n <= 3 ? 110 : n <= 5 ? 95 : n <= 7 ? 82 : 70;

  // Orbit radius
  const rx = (cw / 2) * 0.72;
  const ry = (ch / 2) * 0.72;

  // Special layouts
  let positions = [];
  if (n === 1) {
    positions = [{ x: cw/2, y: ch/2 }];
  } else if (n === 2) {
    positions = [
      { x: cw/2 - rx*0.55, y: ch/2 },
      { x: cw/2 + rx*0.55, y: ch/2 },
    ];
  } else {
    // Evenly spaced on ellipse, offset by -90deg so first bubble is at top
    const offset = -Math.PI / 2;
    for (let i = 0; i < n; i++) {
      const angle = offset + (2 * Math.PI * i) / n;
      positions.push({
        x: cw/2 + rx * Math.cos(angle),
        y: ch/2 + ry * Math.sin(angle),
      });
    }
  }

  children.forEach((child, i) => {
    const isLeaf = !child.children || child.children.length === 0;
    const color = child.color || parentColor || '#60A5FA';
    const size = baseSize;

    const bubble = document.createElement('div');
    bubble.className = 'child-bubble bubble-pop' + (isLeaf ? ' leaf-bubble' : '') + (size >= 95 ? ' large' : '');
    bubble.style.setProperty('--bubble-color', color);
    bubble.style.width  = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left   = positions[i].x + 'px';
    bubble.style.top    = positions[i].y + 'px';
    bubble.style.animationDelay = (i * 0.06) + 's';

    bubble.innerHTML = `
      <div class="bubble-label">${child.label}</div>
      <div class="bubble-sub">${child.subtitle || ''}</div>
    `;

    if (!isLeaf) {
      bubble.addEventListener('click', () => navigateTo(child));
    } else {
      bubble.addEventListener('click', () => renderLeafDetail(child));
    }

    container.appendChild(bubble);
  });
}

// ── RENDER ───────────────────────────────────────────────────
function render(node) {
  current = node;
  const color = node.color || '#60A5FA';
  const children = node.children || [];
  const hasChildren = children.length > 0;

  // CSS vars
  document.documentElement.style.setProperty('--node-color', color);
  document.documentElement.style.setProperty('--node-color-alpha', colorAlpha(color, 0.12));
  document.documentElement.style.setProperty('--node-glow', colorAlpha(color, 0.1));
  document.documentElement.style.setProperty('--node-glow-soft', colorAlpha(color, 0.05));

  // Left panel
  document.getElementById('node-subtitle').textContent = node.subtitle || '';
  document.getElementById('node-name').textContent = node.label;
  document.getElementById('node-desc').textContent = node.description || '';
  document.getElementById('node-example').textContent = node.example || '';

  // Center label header
  document.getElementById('children-label').textContent =
    hasChildren ? 'Subnodos disponibles' : 'Nodo terminal';

  // Render floating bubbles
  renderBubbles(children, color);

  // Breadcrumb
  renderBreadcrumb();

  // Back button
  const backBtn = document.getElementById('back-btn');
  backBtn.style.display = history.length > 0 ? 'flex' : 'none';

  // Bottom: siblings
  renderSiblings();

  // Animate left panel
  document.getElementById('node-panel').classList.remove('fade-enter');
  void document.getElementById('node-panel').offsetWidth;
  document.getElementById('node-panel').classList.add('fade-enter');
}

function renderSiblings() {
  const scroll = document.getElementById('children-scroll');
  const noChildren = document.getElementById('no-children');
  const label = document.getElementById('children-label-fixed');
  scroll.innerHTML = '';

  const siblings = getSiblings(current.id, DATA);

  if (!siblings || siblings.length <= 1) {
    // If at root or no siblings, show root's children as navigation
    if (current.id === DATA.id) {
      // At root: show root's children
      const rootChildren = DATA.children || [];
      if (rootChildren.length === 0) {
        noChildren.style.display = 'block';
        label.style.opacity = '0.3';
        return;
      }
      noChildren.style.display = 'none';
      label.style.opacity = '1';
      label.textContent = 'explorar →';
      rootChildren.forEach((child, i) => renderSiblingCard(child, scroll, false, i));
    } else {
      noChildren.style.display = 'block';
      label.style.opacity = '0.3';
    }
    return;
  }

  noChildren.style.display = 'none';
  label.style.opacity = '1';
  label.textContent = 'en este nivel →';

  siblings.forEach((sibling, i) => {
    const isCurrent = sibling.id === current.id;
    renderSiblingCard(sibling, scroll, isCurrent, i);
  });
}

function renderSiblingCard(node, container, isCurrent, i) {
  const isLeaf = !node.children || node.children.length === 0;
  const el = document.createElement('div');
  el.className = 'child-node' + (isLeaf ? ' leaf-node' : '') + (isCurrent ? ' current-sibling' : '');
  el.style.setProperty('--node-color', node.color || current.color || '#60A5FA');
  el.style.animationDelay = `${i * 0.04}s`;
  el.classList.add('fade-enter');

  el.innerHTML = `
    <div class="child-label">${node.label}</div>
    <div class="child-subtitle">${node.subtitle || ''}</div>
    ${!isLeaf && !isCurrent ? '<div class="child-arrow">→</div>' : ''}
  `;

  if (!isCurrent) {
    el.addEventListener('click', () => {
      if (!isLeaf) {
        // Navigate to sibling: adjust history
        // Pop current, push sibling's parent context
        const ancestors = getAncestors(current.id, DATA) || [];
        if (ancestors.length > 1) {
          // Replace current in history
          history.push(ancestors[ancestors.length - 2].id);
        }
        render(node);
      } else {
        renderLeafDetail(node);
      }
    });
  }

  container.appendChild(el);
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  const ancestors = getAncestors(current.id, DATA) || [];
  ancestors.forEach((node, i) => {
    const span = document.createElement('span');
    span.className = 'bc-item' + (i === ancestors.length - 1 ? ' active' : '');
    span.textContent = node.label;
    if (i < ancestors.length - 1) {
      span.addEventListener('click', () => navigateToBreadcrumb(node, i));
    }
    bc.appendChild(span);
    if (i < ancestors.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = '/';
      bc.appendChild(sep);
    }
  });
}

function navigateTo(node) {
  history.push(current.id);
  render(node);
}

function navigateToBreadcrumb(node, depth) {
  const ancestors = getAncestors(current.id, DATA) || [];
  const stepsBack = ancestors.length - 1 - depth;
  for (let i = 0; i < stepsBack; i++) history.pop();
  render(node);
}

function navigateBack() {
  if (history.length === 0) return;
  const prevId = history.pop();
  const prevNode = findNode(prevId, DATA);
  if (prevNode) render(prevNode);
}

function renderLeafDetail(node) {
  const color = node.color || current.color || '#60A5FA';
  document.documentElement.style.setProperty('--node-color', color);
  document.getElementById('node-subtitle').textContent = node.subtitle || '';
  document.getElementById('node-name').textContent = node.label;
  document.getElementById('node-desc').textContent = node.description || '';
  document.getElementById('node-example').textContent = node.example || '';
  document.getElementById('children-label').textContent = 'Nodo terminal';
  document.getElementById('children-count-text').innerHTML = 'Selecciona otro nodo para continuar';

  // Clear bubbles
  document.querySelectorAll('.child-bubble').forEach(b => b.remove());
  document.getElementById('center-label-area').style.display = 'block';
  document.getElementById('terminal-msg').style.display = 'none';

  document.getElementById('node-panel').classList.remove('fade-enter');
  void document.getElementById('node-panel').offsetWidth;
  document.getElementById('node-panel').classList.add('fade-enter');
}

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', navigateBack);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if (document.activeElement.tagName !== 'INPUT') navigateBack();
  }
});

// Re-render bubbles on window resize
window.addEventListener('resize', () => {
  if (current) renderBubbles(current.children || [], current.color);
});

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    render(DATA);
  })
  .catch(() => {
    document.getElementById('node-name').textContent = 'Error cargando data.json';
    document.getElementById('node-desc').textContent = 'Asegúrate de abrir el archivo desde un servidor local o GitHub Pages.';
  });
</script>
